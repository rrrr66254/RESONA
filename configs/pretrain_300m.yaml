# RESONA-300M pretrain config — A100 8x, ~5 days for 100 epochs
seed: 42

data:
  data_dir: /scratch/x3397a12/resona/data
  index_cache_dir: /scratch/x3397a12/resona/cache/index
  # RESONA-v1 frozen list (2026-04-28). New datasets after this date go to v2.
  # See memory/resona_architecture.md "데이터 Versioning 정책"
  datasets: [autsl, chicago_fswild, dgs, ghanaian_sl, greek_sl, how2sign,
             include, karsl, ksl_sign103, ksl_sign636, lsa64, phoenix,
             sign2mint, slovo, yt_asl]    # 15 H5 files (ksl_sign103+636 split)
  clip_len: 256
  flat_dim: 234
  batch_size: 16                 # per-GPU
  num_workers: 8
  augment:
    spatial_jitter: 0.05
    temporal_crop: true
    horizontal_flip_prob: 0.5

model:
  d_model: 1024
  n_heads: 16
  n_layers: 24
  ffn_dim: 4096
  dropout: 0.1
  max_len: 512
  use_flash_attn: true           # falls back to SDPA if not built

objective:
  # Lean: MSM-only for primary pretrain (fewer moving parts, faster debug).
  # BYOL contrastive is ablation row only; toggle on for ablation runs.
  msm:
    enabled: true
    mask_ratio: 0.60
    mask_type: joint
    loss_weight: 1.0
  contrastive:
    enabled: false               # ablation: set true to add BYOL
    proj_dim: 256
    ema_decay: 0.996
    temperature: 0.07
    loss_weight: 0.5

train:
  total_steps: 500000            # ~100 epochs over ~120M frames
  lr: 4.0e-4
  weight_decay: 0.05
  warmup_steps: 5000
  grad_clip: 1.0
  amp: bf16
  ckpt_interval: 2000
  eval_interval: 5000
  log_interval: 50
