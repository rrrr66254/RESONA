# RESONA-100M pretrain config — 5090 single GPU, ~3-5 days
# Designed for 5090 32GB. bf16 AMP keeps memory ~12-15 GB.
seed: 42

data:
  data_dir: /mnt/synology_nas_00/junkim/AutoResearch/data/cache
  index_cache_dir: /mnt/synology_nas_00/junkim/AutoResearch/data/.cache/index_resona
  # RESONA-v1 frozen list (16 H5)
  datasets: [autsl, chicago_fswild, dgs, ghanaian_sl, greek_sl, how2sign,
             include, karsl, ksl_sign103, ksl_sign636, lsa64, openasl,
             phoenix, sign2mint, slovo, yt_asl]
  clip_len: 256
  flat_dim: 234
  batch_size: 8                  # 5090 32GB safe
  num_workers: 2                 # NAS friendly (sltrain experience)
  augment:
    spatial_jitter: 0.02
    horizontal_flip_prob: 0.5
    speed_range: [0.85, 1.15]

model:
  d_model: 512
  n_heads: 8
  n_layers: 12
  ffn_dim: 2048
  dropout: 0.1
  max_len: 512
  use_flash_attn: false          # not built on sltrain

objective:
  msm:
    enabled: true
    mask_ratio: 0.60
    mask_type: joint
    loss_weight: 1.0
  contrastive:
    enabled: false               # MSM only (lean), ablation row only

train:
  total_steps: 200000            # ~3-5 days on 5090 single
  lr: 4.0e-4
  weight_decay: 0.05
  warmup_steps: 2000
  grad_clip: 1.0
  amp: bf16
  ckpt_interval: 5000
  eval_interval: 10000
  log_interval: 100
