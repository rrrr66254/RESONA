# Sanity-check config — single GPU, tiny model, 10 steps
seed: 42

data:
  data_dir: /scratch/x3397a12/resona/data
  datasets: [autsl, lsa64]      # smallest two
  clip_len: 64
  flat_dim: 234                  # 77 joints * 3
  batch_size: 4
  num_workers: 2

model:
  d_model: 256
  n_heads: 4
  n_layers: 4
  ffn_dim: 1024
  dropout: 0.1
  max_len: 256

objective:
  msm:
    enabled: true
    mask_ratio: 0.40
    mask_type: joint        # joint | frame | block
  contrastive:
    enabled: true
    proj_dim: 128
    ema_decay: 0.99
    temperature: 0.1

train:
  steps: 10
  lr: 4.0e-4
  weight_decay: 0.05
  warmup_steps: 0
  grad_clip: 1.0
  amp: bf16
  log_interval: 1
